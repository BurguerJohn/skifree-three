<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkiFree</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="game"></canvas>
      <div id="style-effects" aria-live="polite" aria-atomic="false"></div>
      <nav id="language-switcher" aria-label="Selecionar idioma">
        <button type="button" data-language="en-US" aria-label="English (United States)" title="English (United States)">
          <span aria-hidden="true">🇺🇸</span>
        </button>
        <button type="button" data-language="pt-BR" aria-label="Português (Brasil)" title="Português (Brasil)">
          <span aria-hidden="true">🇧🇷</span>
        </button>
      </nav>
      <section id="hud" aria-label="Status do SkiFree">
        <div class="hud-title">SkiFree</div>
        <dl>
          <div><dt data-i18n="timeLabel">Tempo:</dt><dd id="time-value">0:00:00.00</dd></div>
          <div><dt data-i18n="distanceLabel">Dist.:</dt><dd id="distance-value">0m</dd></div>
          <div><dt data-i18n="speedLabel">Veloc.:</dt><dd id="speed-value">0m/s</dd></div>
          <div><dt data-i18n="styleLabel">Aura:</dt><dd id="style-value">0</dd></div>
        </dl>
      </section>
      <div id="pause-card" data-i18n="paused" hidden>Pausado</div>
      <section id="course-result-card" aria-label="Recordes" hidden>
        <h2 data-i18n="records">Recordes</h2>
        <div id="course-result-name"></div>
        <ol id="course-result-list"></ol>
        <div class="result-hint" data-i18n="resultHint">Toque na tela ou pressione Enter para continuar</div>
      </section>
      <div id="load-card" data-i18n="loading">Carregando</div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
