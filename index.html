<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkiFree</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="game"></canvas>
      <div id="style-effects" aria-live="polite" aria-atomic="false"></div>
      <section id="hud" aria-label="SkiFree status">
        <div class="hud-title">SkiFree</div>
        <dl>
          <div><dt>Time:</dt><dd id="time-value">0:00:00.00</dd></div>
          <div><dt>Dist:</dt><dd id="distance-value">0m</dd></div>
          <div><dt>Speed:</dt><dd id="speed-value">0m/s</dd></div>
          <div><dt>Style:</dt><dd id="style-value">0</dd></div>
        </dl>
      </section>
      <div id="pause-card" hidden>Paused</div>
      <div id="load-card">Loading</div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
