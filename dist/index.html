<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkiFree</title>
    <link rel="icon" href="data:," />
    <script type="module" crossorigin src="./assets/index-D6TvCew4.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B8qgEDnb.css">
  </head>
  <body>
    <main id="app">
      <canvas id="game"></canvas>
      <div id="style-effects" aria-live="polite" aria-atomic="false"></div>
      <nav id="language-switcher" aria-label="Selecionar idioma">
        <button type="button" data-language="en-US" aria-label="English (United States)" title="English (United States)">
          <span aria-hidden="true">🇺🇸</span>
        </button>
        <button type="button" data-language="pt-BR" aria-label="Português (Brasil)" title="Português (Brasil)">
          <span aria-hidden="true">🇧🇷</span>
        </button>
      </nav>
      <a
        id="github-link"
        href="https://github.com/BurguerJohn/skifree-three"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub: SkiFree Three.js"
        title="GitHub: SkiFree Three.js"
      >
        <img src="./assets/github-invertocat.svg" alt="" aria-hidden="true" />
      </a>
      <section id="hud" aria-label="Status do SkiFree">
        <div class="hud-title">SkiFree</div>
        <dl>
          <div><dt data-i18n="timeLabel">Tempo:</dt><dd id="time-value">0:00:00.00</dd></div>
          <div><dt data-i18n="distanceLabel">Dist.:</dt><dd id="distance-value">0m</dd></div>
          <div><dt data-i18n="speedLabel">Veloc.:</dt><dd id="speed-value">0m/s</dd></div>
          <div><dt data-i18n="styleLabel">Aura:</dt><dd id="style-value">0</dd></div>
        </dl>
      </section>
      <div id="pause-card" data-i18n="paused" hidden>Pausado</div>
      <section id="course-result-card" aria-label="Recordes" hidden>
        <h2 data-i18n="records">Recordes</h2>
        <div id="course-result-name"></div>
        <section id="course-result-summary" aria-labelledby="course-result-summary-title">
          <h3 id="course-result-summary-title" data-i18n="summaryTitle">Resumo da prova</h3>
          <p id="personal-best" hidden></p>
          <dl id="course-result-stats"></dl>
        </section>
        <h3 class="ranking-title" data-i18n="rankingTitle">Classificação</h3>
        <ol id="course-result-list"></ol>
        <button id="copy-result-button" type="button" data-i18n="copyResult">Copiar resultado</button>
        <p id="copy-result-status" role="status" aria-live="polite"></p>
        <div class="result-hint" data-i18n="resultHint">Toque na tela ou pressione Enter para continuar</div>
      </section>
      <div id="load-card" data-i18n="loading">Carregando</div>
    </main>
  </body>
</html>
